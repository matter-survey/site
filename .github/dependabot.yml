version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 15
    # Bundle the Symfony 7.4 LTS components into a single PR per run. They
    # bump together on the framework's release cadence; reviewing 15 nearly
    # identical patch PRs is just noise.
    groups:
      symfony:
        patterns:
          - "symfony/*"
        update-types:
          - "minor"
          - "patch"
    # Stay on Symfony 7.4 LTS (see #175). These framework components are pinned
    # to 7.4.* in composer.json and follow the framework's release cycle, so
    # major bumps would force the whole framework off LTS. Standalone bundles
    # (flex, monolog-bundle, stimulus-bundle, ux-*, maker-bundle) version
    # independently and are intentionally left out so they can be reviewed
    # case by case.
    ignore:
      - dependency-name: "symfony/asset-mapper"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/browser-kit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/cache"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/console"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/css-selector"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/debug-bundle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/dotenv"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/form"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/framework-bundle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/http-client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/rate-limiter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/runtime"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/security-bundle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/string"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/translation"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/twig-bundle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/validator"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/web-profiler-bundle"
        update-types: ["version-update:semver-major"]
      - dependency-name: "symfony/yaml"
        update-types: ["version-update:semver-major"]

  # Dev tools live under tools/<tool>/composer.json with their own committed
  # lockfile, isolated from the main app's dependency graph. Dependabot needs
  # an explicit entry per directory.
  - package-ecosystem: "composer"
    directory: "/tools/rector"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "composer"
    directory: "/tools/phpstan"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "composer"
    directory: "/tools/php-cs-fixer"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 15

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 15
