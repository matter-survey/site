monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                channels: ["!event"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: "%kernel.logs_dir%/deprecation.log"
                formatter: monolog.formatter.json
            otel:
                # Bridges Monolog INFO+ records to the OpenTelemetry LoggerProvider.
                # No-op when OTEL_LOGS_EXPORTER=none (default) since the global
                # provider is then a Noop. Flip OTEL_LOGS_EXPORTER=otlp to enable.
                # NOTE: MonologBundle ignores `level:` for `type: service` handlers
                # (it only aliases the service), so the INFO+ threshold is enforced
                # in the handler constructor (OtelLogsHandler), not here.
                type: service
                id: App\Observability\Monolog\OtelLogsHandler
                channels: ["!event", "!deprecation"]
