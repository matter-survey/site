parameters:
    # OpenTelemetry defaults applied when the env var is unset (e.g. on hosts
    # whose .env isn't synced). Operators override via .env.local on prod.
    env(OTEL_SDK_DISABLED): 'true'
    env(OTEL_SERVICE_NAME): 'matter-survey'
    env(OTEL_SERVICE_VERSION): 'dev'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Observability\Bootstrap\OtelBootstrap:
        arguments:
            $serviceName: '%env(OTEL_SERVICE_NAME)%'
            $serviceVersion: '%env(OTEL_SERVICE_VERSION)%'
            $environment: '%kernel.environment%'
            $disabled: '%env(bool:OTEL_SDK_DISABLED)%'

    App\Observability\Monolog\OtelMonologProcessor:
        tags:
            - { name: monolog.processor }
