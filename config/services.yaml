# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

parameters:
    # OpenTelemetry defaults applied when the env var is unset (e.g. on hosts
    # whose .env isn't synced). Operators override via .env.local on prod.
    env(OTEL_SDK_DISABLED): 'true'
    env(OTEL_SERVICE_NAME): 'matter-survey'
    env(OTEL_SERVICE_NAMESPACE): 'matter-survey'
    env(OTEL_SERVICE_VERSION): 'dev'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        bind:
            $projectDir: '%kernel.project_dir%'
            $canonicalBaseUrl: '%env(CANONICAL_BASE_URL)%'

    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'

    App\Observability\Bootstrap\OtelBootstrap:
        arguments:
            $serviceName: '%env(OTEL_SERVICE_NAME)%'
            $serviceNamespace: '%env(OTEL_SERVICE_NAMESPACE)%'
            # Release version: single source shared with the Faro app.version
            # meta tag (see config/packages/app_version.php).
            $serviceVersion: '%app.version%'
            $environment: '%kernel.environment%'
            $disabled: '%env(bool:OTEL_SDK_DISABLED)%'

    App\Observability\Monolog\OtelMonologProcessor:
        tags:
            - { name: monolog.processor }

    App\Observability\HttpClient\TracingHttpClient:
        decorates: 'http_client'
        arguments:
            $inner: '@.inner'
