-
  id: 1294
  name: 'Account Login'
  features: {  }
  attributes: {  }
  commands:
    -
      code: 0
      name: GetSetupPIN
      direction: client→server
      optional: false
      parameters:
        -
          name: TempAccountIdentifier
          type: char_string
      description: 'The purpose of this command is to determine if the active user account of the given Content App matches the active user account of a given Commissionee, and when it does, return a Setup PIN which can be used for password-authenticated session establishment (PASE) with the Commissionee.'
    -
      code: 1
      name: GetSetupPINResponse
      direction: server→client
      optional: false
      parameters:
        -
          name: SetupPIN
          type: char_string
      description: 'This message is sent in response to the GetSetupPIN command, and contains the Setup PIN, or null when the account identified in the request does not match the active account of the running Content App.'
    -
      code: 2
      name: Login
      direction: client→server
      optional: false
      parameters:
        -
          name: TempAccountIdentifier
          type: char_string
        -
          name: SetupPIN
          type: char_string
        -
          name: Node
          type: node_id
      description: 'The purpose of this command is to allow the Content App to assume the user account of a given Commissionee by leveraging the Setup PIN input by the user during the commissioning process.'
    -
      code: 3
      name: Logout
      direction: client→server
      optional: false
      parameters:
        -
          name: Node
          type: node_id
      description: 'The purpose of this command is to instruct the Content App to clear the current user account.'
  description: 'This cluster provides commands that facilitate user account login on a Content App or a node. For example, a Content App running on a Video Player device, which is represented as an endpoint (see [TV Architecture]), can use this cluster to help make the user account on the Content App match the user account on the Client.'
  clusterRevision: 2
